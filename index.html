<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bolão Copa 2026 — Brunel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--y:#F0E000;--rd:#D0021B;--tl:#007E76;--pp:#6B21A8;--bg:#0B1220;--cd:#111827;--mi:#6B7280;--br:#1E2D42}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#F1F5F9;min-height:100vh}
.screen{display:none;min-height:100vh}.screen.active{display:flex;flex-direction:column}
#ls{align-items:center;justify-content:center;background:#0E1520;padding:20px;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(26,75,168,.2) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 30%,rgba(208,2,27,.15) 0%,transparent 60%)}
.lw{width:100%;max-width:360px}
.brand{text-align:center;margin-bottom:28px}
.bey{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:6px}
.bnm{font-size:68px;font-weight:800;color:var(--y);letter-spacing:-2px;line-height:1;display:block;font-family:Georgia,serif}
.bsb{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:4px;text-transform:uppercase;margin-top:4px}
.lc{background:#141E2E;border:1px solid #1E2D42;border-radius:12px;padding:24px}
.lc h2{font-size:13px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:20px;text-align:center}
.fd{margin-bottom:12px}
.fd label{display:block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:4px}
.fd select,.fd input{width:100%;padding:10px 12px;border-radius:6px;border:1px solid #1E2D42;background:#0E1520;color:#F1F5F9;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border .2s;appearance:none}
.fd select:focus,.fd input:focus{border-color:var(--y)}
.fd select option{background:#0E1520}
.btnp{width:100%;padding:12px;background:var(--y);border:none;border-radius:7px;color:#0B1220;font-size:18px;font-weight:800;letter-spacing:3px;cursor:pointer;margin-top:4px;font-family:Georgia,serif}
.btnp:hover{background:#FFE800}
.le{color:#F87171;font-size:11px;margin-top:7px;text-align:center;min-height:16px}
.ll{text-align:center;margin-top:12px}
.ll button{background:none;border:none;color:rgba(255,255,255,.25);font-size:11px;cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif}
.ll button:hover{color:var(--y)}
header{background:#0E1520;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--y)}
.hl{font-size:19px;font-weight:800;color:var(--y);font-family:Georgia,serif}
.hl span{color:rgba(255,255,255,.35);font-weight:400;font-size:12px;margin-left:4px}
.hu{display:flex;align-items:center;gap:8px}
.hu strong{color:var(--y);font-size:12px}
.sbd{font-size:10px;padding:3px 8px;border-radius:99px;font-weight:700}
.sbd.ok{background:rgba(0,126,118,.2);color:#34D399;border:1px solid rgba(52,211,153,.25)}
.sbd.er{background:rgba(208,2,27,.15);color:#F87171;border:1px solid rgba(248,113,113,.25)}
.sbd.sy{background:rgba(240,224,0,.1);color:var(--y);border:1px solid rgba(240,224,0,.25)}
.bo{background:none;border:1px solid #1E2D42;color:#6B7280;padding:3px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif}
.bo:hover{border-color:var(--y);color:var(--y)}
nav{background:#0E1520;border-bottom:1px solid #1E2D42;display:flex;overflow-x:auto;position:sticky;top:52px;z-index:99}
nav button{font-family:'DM Sans',sans-serif;background:none;border:none;padding:12px 14px;font-size:12px;font-weight:600;color:var(--mi);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
nav button.act{color:var(--y);border-bottom-color:var(--y)}
nav button:hover:not(.act){color:#F1F5F9}
main{max-width:920px;margin:0 auto;padding:18px 12px 80px}
.ca{background:var(--cd);border-radius:10px;padding:18px;margin-bottom:14px;border:1px solid var(--br)}
.ct{font-size:17px;font-weight:700;color:#F1F5F9;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.stabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.st{padding:4px 12px;border-radius:99px;border:1.5px solid var(--br);background:transparent;font-size:11px;font-weight:700;cursor:pointer;color:var(--mi)}
.pt{width:100%;border-collapse:collapse;font-size:12px}
.pt th{padding:6px 5px;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--mi);text-transform:uppercase;border-bottom:1px solid var(--br);text-align:center}
.pt th.l{text-align:left}
.pt td{padding:8px 5px;border-bottom:1px solid #161F2E;text-align:center;vertical-align:middle}
.pt tr:last-child td{border-bottom:none}
.si{width:38px;height:30px;text-align:center;border:1.5px solid var(--br);border-radius:5px;font-size:17px;color:#F1F5F9;background:#0E1520;outline:none;-moz-appearance:textfield;font-family:Georgia,serif}
.si::-webkit-inner-spin-button,.si::-webkit-outer-spin-button{-webkit-appearance:none}
.si:focus{border-color:#1A4BA8;background:#111827}
.si:disabled{background:#0B1220;color:#2A3A50;cursor:not-allowed;border-color:#161F2E}
.vs{font-size:11px;font-weight:700;color:var(--mi)}
.tm{font-weight:600;font-size:12px;color:#F1F5F9}
.ts{font-size:10px;color:var(--mi)}
.dt{font-size:10px;color:var(--mi)}
.pb{font-size:16px;font-weight:700;font-family:Georgia,serif}
.p5{color:#34D399}.p3{color:#60A5FA}.p0{color:#374151}
.rt{width:100%;border-collapse:collapse}
.rt th{padding:8px 12px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--mi);border-bottom:1px solid var(--br);text-align:left}
.rt td{padding:10px 12px;border-bottom:1px solid #161F2E;font-size:13px}
.rt tr:last-child td{border-bottom:none}
.rp{font-size:21px;width:38px;text-align:center;font-family:Georgia,serif}
.r1{color:#F0C000}.r2{color:#9CA3AF}.r3{color:#B45309}
.rn{font-weight:600;font-size:14px;color:#F1F5F9}
.rpt{font-size:24px;color:#60A5FA;text-align:right;font-family:Georgia,serif;font-weight:700}
.ag{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--br);flex-wrap:wrap}
.ag:last-child{border-bottom:none}
.at{font-weight:600;font-size:13px;flex:1;text-align:right;color:#F1F5F9}
.at.r{text-align:left}
.ri{width:40px;height:34px;text-align:center;border:1.5px solid var(--br);border-radius:5px;font-size:17px;background:#0E1520;color:#F1F5F9;outline:none;-moz-appearance:textfield;font-family:Georgia,serif}
.ri::-webkit-inner-spin-button,.ri::-webkit-outer-spin-button{-webkit-appearance:none}
.ri:focus{border-color:var(--rd)}
.bsv{padding:5px 12px;background:var(--tl);border:none;border-radius:5px;color:#fff;font-size:12px;cursor:pointer}
.bsv:hover{filter:brightness(1.15)}
.oks{font-size:10px;color:#34D399;font-weight:700;display:none}
#ss{align-items:center;justify-content:center;background:#0E1520;padding:20px}
.sc{background:#141E2E;border:1px solid #1E2D42;border-radius:12px;padding:24px;width:100%;max-width:360px}
.sc h2{font-size:15px;font-weight:600;color:#F1F5F9;margin-bottom:4px;text-align:center}
.sc p{font-size:11px;color:rgba(255,255,255,.3);text-align:center;margin-bottom:18px}
.al{padding:9px 12px;border-radius:7px;font-size:11px;margin-bottom:10px;border:1px solid}
.aw{background:rgba(217,119,6,.1);color:#FCD34D;border-color:rgba(217,119,6,.3)}
#svb{position:fixed;bottom:0;left:0;right:0;background:#0E1520;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:200;transform:translateY(100%);transition:transform .3s;border-top:2px solid var(--y)}
#svb.up{transform:translateY(0)}
#svb p{color:#6B7280;font-size:11px}
#bsp{padding:8px 20px;background:var(--y);border:none;border-radius:6px;color:#0B1220;font-size:15px;letter-spacing:2px;cursor:pointer;font-weight:800;font-family:Georgia,serif}
.pi{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700}
.pb2{background:rgba(96,165,250,.15);color:#93C5FD;border:1px solid rgba(96,165,250,.2)}
.pg{background:rgba(52,211,153,.12);color:#34D399;border:1px solid rgba(52,211,153,.2)}
.pgr{background:#1E2D42;color:#6B7280}
.rl{background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.15);border-radius:4px;padding:3px 8px;font-size:10px;color:#34D399;text-align:center;margin-top:2px}
.gt{font-size:12px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:4px;color:#fff;display:inline-block}
.gc-A{background:#D0021B}.gc-B{background:#1A4BA8}.gc-C{background:#007E76}.gc-D{background:#6B21A8}
.gc-E{background:#B45309}.gc-F{background:#0369A1}.gc-G{background:#047857}.gc-H{background:#7C3AED}
.gc-I{background:#BE185D}.gc-J{background:#0F766E}.gc-K{background:#9A3412}.gc-L{background:#1D4ED8}
.pmgr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.pcard{background:#0E1520;border:1px solid var(--br);border-radius:8px;padding:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.pcard-name{font-weight:600;font-size:13px;color:#F1F5F9}
.pcard-sub{font-size:10px;color:var(--mi);margin-top:2px}
.btn-rm{background:none;border:1px solid rgba(208,2,27,.3);color:#F87171;border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer}
.btn-rm:hover{background:rgba(208,2,27,.15)}
.add-row{display:flex;gap:8px;align-items:center;margin-top:4px}
.add-row input{flex:1;padding:9px 12px;border-radius:6px;border:1px solid #1E2D42;background:#0E1520;color:#F1F5F9;font-size:13px;outline:none}
.add-row input:focus{border-color:var(--y)}
.btn-add{padding:9px 16px;background:var(--tl);border:none;border-radius:6px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
#lo{position:fixed;inset:0;background:#0B1220;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#lo.hide{display:none}
.lo-logo{font-family:Georgia,serif;font-size:72px;font-weight:800;color:var(--y);letter-spacing:-2px;line-height:1}
.lo-sub{font-size:11px;letter-spacing:4px;color:rgba(255,255,255,.3);text-transform:uppercase}
.lo-bar{width:120px;height:3px;background:#1E2D42;border-radius:99px;overflow:hidden;margin-top:6px}
.lo-prog{height:100%;background:var(--y);border-radius:99px;animation:prog 2s ease forwards}
@keyframes prog{from{width:0}to{width:100%}}
.pts-leg{display:flex;gap:14px;font-size:10px;color:var(--mi);margin-bottom:10px;flex-wrap:wrap}
@media(max-width:560px){.ag{flex-direction:column;align-items:flex-start}.at{text-align:left}main{padding:10px 8px 80px}.pmgr{grid-template-columns:1fr}}
</style>
</head>

function pts(pa,pb,ra,rb){
  if(pa===''||pa==null||pb===''||pb==null) return null;
  if(ra===''||ra==null||rb===''||rb==null) return null;
  pa=+pa; pb=+pb; ra=+ra; rb=+rb;
  if(pa===ra&&pb===rb) return 5;
  const rw=ra>rb?1:ra<rb?-1:0,pw=pa>pb?1:pa<pb?-1:0;
  return pw===rw?3:0;
}
function fmtD(d,t){ const dt=new Date(d+'T'+t+':00'); return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' '+t; }
function locked(d){ const n=new Date(); n.setHours(0,0,0,0); return n>=new Date(d+'T00:00:00'); }
function encKey(n){ return n.replace(/[^a-zA-Z0-9_\-]/g,c=>'_'+c.charCodeAt(0)+'_'); }
function esc(s){ return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

let PARTS=[...DEFAULT_PARTS],me=null,isAdm=false;
let tab='pal',grp='A',dirty=false,edU=null,edG='A';
let _senhas={},_pals={},_res={},_unsubs=[];

(async function init(){
  document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('sc2').addEventListener('keydown',e=>{if(e.key==='Enter')doSenha();});
  setBadge('sy','⟳ conectando');
  try{
    const [pv,sv,palsv,rv]=await Promise.all([fsGet('parts'),fsGet('senhas'),fsGet('pals'),fsGet('res')]);
    PARTS=(pv&&pv.length)?pv:DEFAULT_PARTS.slice();
    _senhas=sv||{}; _pals=palsv||{}; _res=rv||{};
    if(!pv||!pv.length) await fsSet('parts',PARTS);
    setBadge('ok','● ao vivo');
  }catch(e){ console.error(e); setBadge('er','✗ sem conexão'); PARTS=DEFAULT_PARTS.slice(); }
  edU=PARTS[0]||null; buildSelects(); hideLo();
  _unsubs.push(fsListen('pals', v=>{ _pals=v||{}; if(me&&!dirty) showTab(tab); }));
  _unsubs.push(fsListen('res',  v=>{ _res=v||{};  if(me) showTab(tab); }));
  _unsubs.push(fsListen('parts',v=>{ if(v&&v.length){ PARTS=v; buildSelects(); if(me) showTab(tab); } }));
  _unsubs.push(fsListen('senhas',v=>{ _senhas=v||{}; }));
  const u=sessionStorage.getItem('bu'),a=sessionStorage.getItem('ba');
  if(u&&(u==='ADMIN'||PARTS.includes(u))){ me=u; isAdm=(a==='1'); launch(); }
  else showScreen('ls');
})();

function buildSelects(){
  ['lu','su'].forEach(id=>{
    const sel=document.getElementById(id),cur=sel.value;
    sel.innerHTML='<option value="">Selecione…</option>';
    PARTS.forEach(p=>{ const o=document.createElement('option'); o.value=p; o.textContent=p; sel.appendChild(o); });
    if(id==='lu'){ const o=document.createElement('option'); o.value='ADMIN'; o.textContent='ADMIN'; sel.appendChild(o); }
    sel.value=cur;
  });
}

function doLogin(){
  const u=document.getElementById('lu').value,p=document.getElementById('lp').value,e=document.getElementById('le');
  e.textContent='';
  if(!u){ e.textContent='Selecione seu nome.'; return; }
  if(u==='ADMIN'){
    if(p!==ADMIN_PASS){ e.textContent='Senha incorreta.'; return; }
    me='ADMIN'; isAdm=true;
  } else {
    const k=encKey(u),s=_senhas;
    if(!s[k]&&!s[u]){ e.textContent='Defina sua senha em "Primeiro acesso".'; return; }
    if((s[k]||s[u])!==btoa(unescape(encodeURIComponent(p)))){ e.textContent='Senha incorreta.'; return; }
    me=u; isAdm=false;
  }
  sessionStorage.setItem('bu',me); sessionStorage.setItem('ba',isAdm?'1':'0'); launch();
}
function doLogout(){ me=null; isAdm=false; dirty=false; sessionStorage.clear(); document.getElementById('lp').value=''; showScreen('ls'); }
async function doSenha(){
  const u=document.getElementById('su').value,n=document.getElementById('sn').value,
        c=document.getElementById('sc2').value,e=document.getElementById('se');
  e.textContent=''; e.style.color='';
  if(!u){ e.textContent='Selecione seu nome.'; return; }
  if(n.length<4){ e.textContent='Mínimo 4 caracteres.'; return; }
  if(n!==c){ e.textContent='Senhas não coincidem.'; return; }
  const k=encKey(u);
  if(_senhas[k]||_senhas[u]){ e.textContent='Usuário já tem senha. Faça login normalmente.'; return; }
  e.textContent='salvando…';
  const ns={..._senhas}; ns[k]=btoa(unescape(encodeURIComponent(n)));
  const ok=await fsSet('senhas',ns);
  if(ok){ _senhas=ns; e.style.color='#34D399'; e.textContent='Senha criada! Redirecionando…'; setTimeout(()=>{e.textContent='';e.style.color='';showScreen('ls');},1400); }
  else e.textContent='Erro ao salvar. Tente novamente.';
}
function launch(){
  document.getElementById('hn').textContent=isAdm?'⚙ ADMIN':me;
  ['adm','edt','prt'].forEach(x=>document.getElementById('t-'+x).style.display=isAdm?'block':'none');
  document.getElementById('t-pal').style.display=isAdm?'none':'block';
  showScreen('app'); showTab(isAdm?'adm':'pal');
}
function showTab(t){
  tab=t;
  ['pal','rnk','adm','edt','prt'].forEach(x=>{ const b=document.getElementById('t-'+x); if(b) b.classList.toggle('act',x===t); });
  const m=document.getElementById('mn');
  if(t==='pal') renderPal(m);
  else if(t==='rnk') renderRnk(m);
  else if(t==='edt') renderEdt(m);
  else if(t==='prt') renderPrt(m);
  else renderAdm(m);
}

function myPals(){ const k=encKey(me); return _pals[k]||_pals[me]||{}; }
function renderPal(el){
  const mp=myPals();
  let h=`<div class="pts-leg"><span><b style="color:#34D399">5pts</b> placar exato</span><span><b style="color:#60A5FA">3pts</b> vencedor/empate</span><span><b style="color:#374151">0pts</b> erro</span></div>
  <div class="stabs">`;
  GS.forEach(g=>{ const a=g===grp; h+=`<button class="st${a?' act':''}" onclick="swG('${g}')" style="${a?`background:${GC[g]};color:#fff;border-color:${GC[g]}`:''}">G ${g}</button>`; });
  h+=`</div><div class="ca"><div class="ct"><span class="gt gc-${grp}">GRUPO ${grp}</span></div>
  <div style="font-size:11px;color:var(--mi);margin-bottom:10px">${GT[grp].join(' · ')}</div>
  <table class="pt"><thead><tr><th class="l">Confronto</th><th>Data</th><th colspan="3">Palpite</th><th>Pts</th><th></th></tr></thead><tbody>`;
  GAMES.filter(gm=>gm.g===grp).forEach(gm=>{
    const lk=locked(gm.date),pal=mp[gm.id]||{a:'',b:''},r=_res[gm.id],p=r?pts(pal.a,pal.b,r.a,r.b):null;
    const pc=p===5?'p5':p===3?'p3':'p0';
    h+=`<tr>
      <td style="text-align:left"><div class="tm">${gm.a}</div><div class="ts">${gm.b}</div></td>
      <td class="dt">${fmtD(gm.date,gm.t)}</td>
      <td><input type="number" class="si" id="p${gm.id}a" min="0" max="20" value="${pal.a??''}" ${lk?'disabled':''} oninput="mkD()" style="border-color:${lk?'var(--br)':'#1A4BA8'}"/></td>
      <td class="vs">×</td>
      <td><input type="number" class="si" id="p${gm.id}b" min="0" max="20" value="${pal.b??''}" ${lk?'disabled':''} oninput="mkD()" style="border-color:${lk?'var(--br)':'#1A4BA8'}"/></td>
      <td>${p!==null?`<span class="pb ${pc}">${p}</span>`:`<span style="color:#374151">—</span>`}</td>
      <td style="font-size:11px">${lk?'🔒':'✏️'}</td></tr>`;
    if(r) h+=`<tr><td colspan="7"><div class="rl">✅ ${gm.a} ${r.a}×${r.b} ${gm.b}</div></td></tr>`;
  });
  h+=`</tbody></table></div>`;
  let tot=0;
  GAMES.filter(gm=>gm.g===grp).forEach(gm=>{ const p2=_res[gm.id]?pts((mp[gm.id]||{}).a,(mp[gm.id]||{}).b,_res[gm.id].a,_res[gm.id].b):null; if(p2!==null)tot+=p2; });
  h+=`<div style="text-align:right;color:var(--mi);font-size:11px;margin-top:-2px">Grupo ${grp}: <span style="font-size:20px;color:#60A5FA;font-weight:700;font-family:Georgia,serif">${tot} pts</span></div>`;
  el.innerHTML=h;
}

  const pairs=[];
  GAMES.filter(gm=>gm.g===grp).forEach(gm=>{
    if(locked(gm.date)) return;
    const a=document.getElementById('p'+gm.id+'a')?.value??'',b=document.getElementById('p'+gm.id+'b')?.value??'';
    if(a!==''||b!=='') pairs.push({id:gm.id,a,b});
  });
  if(pairs.length){
    setBadge('sy','⟳ salvando');
    const k=encKey(me),np={..._pals}; if(!np[k]) np[k]={};
    pairs.forEach(({id,a,b})=>{ np[k][id]={a,b}; });
    const ok=await fsSet('pals',np); _pals=np;
    setBadge(ok?'ok':'er',ok?'✓ salvo':'✗ erro');
  }
  dirty=false; document.getElementById('svb').classList.remove('up');
  renderPal(document.getElementById('mn'));
}

function getPalsFor(u){ const k=encKey(u); return _pals[k]||_pals[u]||{}; }
function renderRnk(el){
  const sc=PARTS.map(u=>{ let t=0; GAMES.forEach(gm=>{ const p2=_res[gm.id]?pts(getPalsFor(u)[gm.id]?.a,getPalsFor(u)[gm.id]?.b,_res[gm.id].a,_res[gm.id].b):null; if(p2!==null)t+=p2; }); return{u,t}; }).sort((a,b)=>b.t-a.t);
  const md=['🥇','🥈','🥉'];
  let h=`<div class="ca"><div class="ct">🏆 Classificação Geral</div>
  <div style="font-size:10px;color:var(--mi);margin-bottom:10px">5pts = placar exato &nbsp;|&nbsp; 3pts = vencedor / empate</div>
  <table class="rt"><thead><tr><th>#</th><th>Participante</th><th style="text-align:right">Pontos</th></tr></thead><tbody>`;
  sc.forEach((s,i)=>{ const im=s.u===me,rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    h+=`<tr style="${im?'background:rgba(96,165,250,.06)':''}"><td class="rp ${rc}">${md[i]||i+1}</td><td class="rn">${s.u}${im?' <span class="pi pb2">você</span>':''}</td><td class="rpt">${s.t}</td></tr>`; });
  h+=`</tbody></table></div>`;
  const rev=GAMES.filter(gm=>locked(gm.date));
  h+=`<div class="ca"><div class="ct">📋 Palpites Revelados</div>`;
  if(!rev.length) h+=`<p style="color:var(--mi);font-size:12px;text-align:center;padding:16px">Palpites revelados no dia de cada jogo.</p>`;
  else{ rev.slice(-5).reverse().forEach(gm=>{
    const r=_res[gm.id];
    h+=`<div style="margin-bottom:18px"><div style="font-weight:600;font-size:11px;margin-bottom:6px;display:flex;align-items:center;gap:5px;flex-wrap:wrap">
      <span class="gt gc-${gm.g}">G${gm.g}</span><span style="color:#F1F5F9">${gm.a} × ${gm.b}</span>
      <span class="dt">${fmtD(gm.date,gm.t)}</span>
      ${r?`<span class="pi pg">✅ ${r.a}–${r.b}</span>`:`<span class="pi pgr">sem resultado</span>`}
    </div>
    <table class="pt" style="font-size:11px"><thead><tr><th class="l">Participante</th><th>Palpite</th><th>Pts</th></tr></thead><tbody>`;
    PARTS.forEach(u=>{ const pal=getPalsFor(u)[gm.id]||{},p2=r?pts(pal.a,pal.b,r.a,r.b):null,
      pc=p2===5?'p5':p2===3?'p3':'p0',ps=(pal.a!=null&&pal.a!==''&&pal.b!=null&&pal.b!=='')?`${pal.a}×${pal.b}`:'—',im=u===me;
      h+=`<tr style="${im?'background:rgba(96,165,250,.06)':''}"><td style="text-align:left;font-weight:${im?700:400};color:${im?'#93C5FD':'#F1F5F9'}">${u}</td><td style="font-family:Georgia,serif;font-size:14px">${ps}</td><td>${p2!==null?`<span class="pb ${pc}">${p2}</span>`:'—'}</td></tr>`; });
    h+=`</tbody></table></div>`; }); }
  h+=`</div>`; el.innerHTML=h;
}

function renderAdm(el){
  let h=`<div class="al aw">⚠️ Admin — insira os resultados oficiais.</div><div class="stabs">`;
  GS.forEach(g=>{ const a=g===grp; h+=`<button class="st${a?' act':''}" onclick="swAdm('${g}')" style="${a?`background:${GC[g]};color:#fff;border-color:${GC[g]}`:''}">G ${g}</button>`; });
  h+=`</div><div class="ca"><div class="ct"><span class="gt gc-${grp}">GRUPO ${grp}</span></div>
  <div style="font-size:11px;color:var(--mi);margin-bottom:12px">${GT[grp].join(' · ')}</div>`;
  GAMES.filter(gm=>gm.g===grp).forEach(gm=>{ const r=_res[gm.id]||{a:'',b:''};
    h+=`<div class="ag"><div class="at">${gm.a}</div>
    <input type="number" class="ri" id="r${gm.id}a" min="0" max="20" value="${r.a??''}" placeholder="–"/>
    <span style="font-size:16px;color:var(--mi)">×</span>
    <input type="number" class="ri" id="r${gm.id}b" min="0" max="20" value="${r.b??''}" placeholder="–"/>
    <div class="at r">${gm.b}</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0">
      <span class="dt">${fmtD(gm.date,gm.t)}</span>
      <button class="bsv" onclick="svRes(${gm.id})">SALVAR</button>
      <span id="ok${gm.id}" class="oks">✓</span>
    </div></div>`; });
  h+=`</div>`; el.innerHTML=h;
}
function swAdm(g){ grp=g; renderAdm(document.getElementById('mn')); }
async function svRes(id){
  const a=document.getElementById('r'+id+'a').value,b=document.getElementById('r'+id+'b').value;
  if(a===''||b==='') return;
  setBadge('sy','⟳');
  const nr={..._res}; nr[id]={a:+a,b:+b};
  const ok=await fsSet('res',nr); _res=nr;
  setBadge(ok?'ok':'er',ok?'✓ salvo':'✗ erro');
  const oe=document.getElementById('ok'+id); if(oe){ oe.style.display='inline'; setTimeout(()=>{ oe.style.display='none'; },2000); }
}

function renderEdt(el){
  if(!edU) edU=PARTS[0];
  const mp=getPalsFor(edU);
  let h=`<div class="al aw">✏️ Corrija palpites de qualquer participante.</div>
  <div class="ca" style="padding:12px 16px"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <span style="font-size:11px;font-weight:600;color:var(--mi);white-space:nowrap">Participante:</span>
    <div style="display:flex;gap:4px;flex-wrap:wrap">`;
  PARTS.forEach(u=>{ const a=u===edU;
    h+=`<button onclick="setEdU('${esc(u)}')" style="padding:4px 11px;border-radius:99px;border:1.5px solid ${a?'#60A5FA':'var(--br)'};background:${a?'rgba(96,165,250,.15)':'transparent'};color:${a?'#93C5FD':'var(--mi)'};font-size:10px;font-weight:700;cursor:pointer">${u}</button>`; });
  h+=`</div></div></div><div class="stabs">`;
  GS.forEach(g=>{ const a=g===edG; h+=`<button class="st${a?' act':''}" onclick="setEdG('${g}')" style="${a?`background:${GC[g]};color:#fff;border-color:${GC[g]}`:''}">G ${g}</button>`; });
  h+=`</div><div class="ca"><div class="ct"><span class="gt gc-${edG}">GRUPO ${edG}</span> <span style="font-size:12px;font-weight:400;color:var(--mi)">— ${edU}</span></div>
  <table class="pt"><thead><tr><th class="l">Confronto</th><th>Data</th><th colspan="3">Palpite</th><th>Pts</th><th></th></tr></thead><tbody>`;
  GAMES.filter(gm=>gm.g===edG).forEach(gm=>{
    const pal=mp[gm.id]||{a:'',b:''},r=_res[gm.id],p2=r?pts(pal.a,pal.b,r.a,r.b):null,pc=p2===5?'p5':p2===3?'p3':'p0';
    h+=`<tr><td style="text-align:left"><div class="tm">${gm.a}</div><div class="ts">${gm.b}</div></td>
    <td class="dt">${fmtD(gm.date,gm.t)}</td>
    <td><input type="number" class="si" id="ep${gm.id}a" min="0" max="20" value="${pal.a??''}" style="border-color:#6B21A8"/></td>
    <td class="vs">×</td>
    <td><input type="number" class="si" id="ep${gm.id}b" min="0" max="20" value="${pal.b??''}" style="border-color:#6B21A8"/></td>
    <td>${p2!==null?`<span class="pb ${pc}">${p2}</span>`:`<span style="color:#374151">—</span>`}</td>
    <td><button class="bsv" style="background:#6B21A8;font-size:10px;padding:3px 8px" onclick="svEdP(${gm.id})">OK</button>
    <span id="epok${gm.id}" class="oks">✓</span></td></tr>`;
    if(r) h+=`<tr><td colspan="7"><div class="rl">${gm.a} ${r.a}×${r.b} ${gm.b}</div></td></tr>`;
  });
  h+=`</tbody></table></div>
  <div style="text-align:right;margin-top:-6px;margin-bottom:16px">
    <button onclick="svAllEdt()" style="padding:8px 20px;background:#6B21A8;border:none;border-radius:7px;color:#fff;font-size:14px;cursor:pointer;font-family:Georgia,serif;font-weight:700">SALVAR TUDO — GRUPO ${edG}</button>
  </div>`; el.innerHTML=h;
}
function setEdU(u){ edU=u; renderEdt(document.getElementById('mn')); }
function setEdG(g){ edG=g; renderEdt(document.getElementById('mn')); }
async function svEdP(id){
  const a=document.getElementById('ep'+id+'a')?.value??'',b=document.getElementById('ep'+id+'b')?.value??'';
  setBadge('sy','⟳');
  const k=encKey(edU),np={..._pals}; if(!np[k]) np[k]={};
  np[k][id]={a,b};
  const ok=await fsSet('pals',np); _pals=np;
  setBadge(ok?'ok':'er',ok?'✓ salvo':'✗ erro');
  const e=document.getElementById('epok'+id); if(e){ e.style.display='inline'; setTimeout(()=>{ e.style.display='none'; },1500); }
  renderEdt(document.getElementById('mn'));
}
async function svAllEdt(){
  setBadge('sy','⟳ salvando');
  const k=encKey(edU),np={..._pals}; if(!np[k]) np[k]={};
  GAMES.filter(gm=>gm.g===edG).forEach(gm=>{
    const a=document.getElementById('ep'+gm.id+'a')?.value??'',b=document.getElementById('ep'+gm.id+'b')?.value??'';
    np[k][gm.id]={a,b};
  });
  const ok=await fsSet('pals',np); _pals=np;
  setBadge(ok?'ok':'er',ok?'✓ salvo':'✗ erro');
  renderEdt(document.getElementById('mn'));
}

function renderPrt(el){
  let h=`<div class="al aw">👥 Gerencie participantes. Remover não apaga palpites já registrados.</div>
  <div class="ca"><div class="ct">Participantes Ativos <span style="font-size:13px;font-weight:400;color:var(--mi)">(${PARTS.length})</span></div>
  <div class="pmgr">`;
  PARTS.forEach(u=>{ const k=encKey(u),temSenha=!!(_senhas[k]||_senhas[u]);
    h+=`<div class="pcard"><div>
      <div class="pcard-name">${u}</div>
      <div class="pcard-sub">${temSenha?'🔐 senha definida':'⏳ aguardando senha'}</div>
    </div><button class="btn-rm" onclick="rmPart('${esc(u)}')">remover</button></div>`; });
  h+=`</div>
  <div style="border-top:1px solid var(--br);padding-top:14px;margin-top:6px">
    <div style="font-size:12px;font-weight:600;color:var(--mi);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Adicionar participante</div>
    <div class="add-row">
      <input type="text" id="new-part" placeholder="Nome do participante" maxlength="30" onkeydown="if(event.key==='Enter')addPart()"/>
      <button class="btn-add" onclick="addPart()">+ ADICIONAR</button>
    </div>
    <div id="part-msg" style="font-size:11px;margin-top:6px;min-height:16px"></div>
  </div></div>
  <div class="ca" style="border-color:rgba(96,165,250,.2)"><div class="ct" style="font-size:14px">ℹ️ Como funciona</div>
  <div style="font-size:12px;color:var(--mi);line-height:1.8">
    <p>• Novos participantes aparecem no login imediatamente após serem adicionados.</p>
    <p>• Cada um deve acessar <strong style="color:#F1F5F9">Primeiro acesso</strong> para criar sua senha.</p>
    <p>• Remover retira da lista ativa — palpites ficam no histórico.</p>
  </div></div>`; el.innerHTML=h;
}
async function addPart(){
  const inp=document.getElementById('new-part'),msg=document.getElementById('part-msg');
  const nome=inp.value.trim(); msg.style.color='#F87171';
  if(!nome){ msg.textContent='Digite um nome.'; return; }
  if(nome.toUpperCase()==='ADMIN'){ msg.textContent='Nome reservado.'; return; }
  if(PARTS.find(p=>p.toLowerCase()===nome.toLowerCase())){ msg.textContent=`"${nome}" já está na lista.`; return; }
  PARTS.push(nome); setBadge('sy','⟳');
  const ok=await fsSet('parts',PARTS); setBadge(ok?'ok':'er',ok?'✓ salvo':'✗ erro');
  buildSelects(); if(!edU) edU=PARTS[0];
  inp.value=''; msg.style.color='#34D399'; msg.textContent=`"${nome}" adicionado!`;
  renderPrt(document.getElementById('mn'));
}
async function rmPart(u){
  if(!confirm(`Remover "${u}" do bolão?`)) return;
  PARTS=PARTS.filter(p=>p!==u); setBadge('sy','⟳');
  const ok=await fsSet('parts',PARTS); setBadge(ok?'ok':'er',ok?'✓ salvo':'✗ erro');
  buildSelects(); if(edU===u) edU=PARTS[0]||null;
  renderPrt(document.getElementById('mn'));
}

Object.assign(window,{
  doLogin,doLogout,doSenha,showSS(){showScreen('ss');},goL(){showScreen('ls');},
  showTab,savePal,swG,mkD,svRes,swAdm,setEdU,setEdG,svEdP,svAllEdt,addPart,rmPart
});
</script>
</body>
